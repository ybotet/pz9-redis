services:
  postgres:
    image: postgres:15
    container_name: pz7-postgres
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: tasksuser
      POSTGRES_PASSWORD: taskspass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pz7-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasksuser -d tasksdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    container_name: pz7-auth
    environment:
      - AUTH_HTTP_PORT=8081
      - AUTH_GRPC_PORT=50051
      - JWT_SECRET=your-secret-key-change-in-production
    ports:
      - "8081:8081"
    networks:
      - pz7-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  tasks:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: pz7-
    ports:
      - 8082:8082
    environment:
      - AUTH_GRPC_ADDR=auth:50051
      - TASKS_PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=tasksuser
      - DB_PASSWORD=taskspass
      - DB_NAME=tasksdb
      - DB_SSLMODE=disable
      # ========== NUEVAS VARIABLES PARA REDIS ==========
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
      # ================================================
    networks:
      - pz7-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pz7-redis
    command: redis-server --appendonly yes --appendfilename appendonly.aof
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pz7-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pz7-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    networks:
      - pz7-network
    depends_on:
      - tasks

volumes:
  postgres_data:
  redis_data:

networks:
  pz7-network:
    driver: bridge
